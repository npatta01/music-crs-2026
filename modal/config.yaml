app_name: "music-crs"

volumes:
  hf_cache: "music-crs-hf-cache"
  results: "music-crs-results"
  models: "music-crs-models"
  # Unified Volumes-v2 cache: one volume holding both the LiteLLM file cache
  # (LLM completions + vLLM-endpoint embeddings) and the GPU-native encoder
  # vectors (Qwen3-0.6B, SigLIP-2, CLAP), under separate subdirs. Replaces the
  # former split music-crs-litellm-cache-v2 + music-crs-embedding-cache volumes.
  cache: "music-crs-cache"

container:
  hf_cache_dir: "/root/.cache/huggingface"
  exp_dir: "/root/exp"
  models_dir: "/root/models"
  # Both cache subsystems live under one mounted volume (container.cache_dir).
  cache_dir: "/root/cache"
  litellm_cache_dir: "/root/cache/litellm"
  embedding_cache_dir: "/root/cache/embedding"

litellm_cache:
  backend: "file"

inference:
  gpu:
    - "H200"
    - "H100"
    - "L40S"
    - "A100-80GB"
    - "A100-40GB"
  devset_batch_size: 8
  blindset_batch_size: 8

lancedb:
  # v0+ inference is async I/O bound (OpenRouter LLM extractor) ONLY on a cold
  # cache. When the litellm + embedding caches are warm (e.g. re-running a split
  # PR #105 already covered), there is no network I/O and the workload becomes
  # CPU-bound retrieval: the 12-branch fan-out (BM25 + 6 dense + 4 centroid +
  # disco/era-pop) does ANN/scan over 47k tracks at topk=1000 per turn.
  #
  # Measured (cached path, max_in_flight=8): ~4 cores used (the per-turn fusion
  # is single-threaded Python / GIL-bound, so cores beyond ~4-6 sit idle — scale
  # wall-clock with --num_shards, not cores), and 20-25 GiB RAM (full 47k catalog
  # + BM25 index + eager vectors loaded per process). Reserve 6 cores / 32 GiB:
  # ~6 covers the native-thread spikes, 32 GiB covers the ~25 GiB peak with
  # headroom (16 GiB was under-reserved — shards bursted to 25 GiB, OOM risk).
  inference_cpu: 6.0
  inference_memory: 32768
  query_cpu: 4.0
  query_memory: 16384
  query_scaledown_window: 300
  query_max_containers: 1

litellm:
  cpu: 2.0
  memory: 8192
  scaledown_window: 300
  max_containers: 1
  embedding_model: "openrouter/openai/text-embedding-3-small"
  chat_model: "openrouter/google/gemma-3-4b-it"
  small_chat_model: "huggingface/featherless-ai/Qwen/Qwen3-0.6B"

# Modal GPU-backed Qwen3-Embedding-0.6B service used by the v0+ compiler.
# Loaded on @modal.enter, scaled to zero after `scaledown_window` seconds idle.
# T4 is the cheapest GPU that fits the 0.6B model with headroom; bump to L4 /
# A10G if encoder throughput becomes a bottleneck again.
qwen3_encoder:
  gpu: "T4"
  cpu: 2.0
  memory: 8192
  timeout: 600
  scaledown_window: 300
  # GPU budget: the project cap is 10 concurrent GPUs. The 3 GPU pools active
  # during a v0+ run must sum to <=10 so they don't starve each other:
  #   Qwen3Encoder(0.6B)=4 + vllm-8b=4 + MultimodalTextEncoder(clap)=2 = 10.
  # (vllm-4b is idle for the canonical config.) The 0.6B encoder gets the
  # largest slice since several dense branches route to it.
  max_containers: 4
  # bfloat16 on T4 — same accuracy as fp32 for 0.6B at half the memory.
  torch_dtype: "bfloat16"
  batch_size: 32

# Modal GPU-backed b1 encoder: the fine-tuned 4B v_struct_pt conv->track model,
# served as the `b1_cos` cache-MISS fallback so a local (or blindset) run that
# lacks the ~16GB weights on disk encodes on Modal instead of crashing. Loads
# from the models volume (MCRS_B1_MODEL_DIR) on @modal.enter; scales to zero idle.
# L4 (24GB) fits the 4B in bf16 (matches vllm-4b). Kept low in the GPU budget
# since it only fires on un-warmed b1 queries (a pre-warmed namespace = pure
# cache hits, no encoder).
b1_encoder:
  gpu: "L4"
  cpu: 4.0
  memory: 16384
  timeout: 600
  scaledown_window: 300
  max_containers: 2
  torch_dtype: "bfloat16"
  batch_size: 8
  max_length: 2048
  # The fine-tuned 4B weights live on the `scout-models` volume (written by the
  # bi-encoder variant trainer), NOT music-crs-models — mount it read-only and
  # load from <weights_mount>/<model_subdir>.
  weights_volume: "scout-models"
  weights_mount: "/root/scout-models"
  model_subdir: "biencoder_variant_v_struct_pt_l2048_qwen3-embedding-4b"

# vLLM OpenAI-compatible embedding services (separate Modal app "music-crs-vllm").
# Scale-to-zero; weights lazy-downloaded to the hf-cache volume on first boot.
vllm:
  app_name: "music-crs-vllm"
  # torch-compile / vLLM artifact cache volume (cold-start speedup).
  cache_volume: "music-crs-vllm-cache"
  cache_dir: "/root/.cache/vllm"
  models:
    qwen3-embedding-4b:
      hf_id: "Qwen/Qwen3-Embedding-4B"
      served_name: "Qwen/Qwen3-Embedding-4B"
      task: "embed"
      gpu: "L4"
      dtype: "bfloat16"
      max_model_len: 8192
      max_inputs: 64  # max concurrent inputs per replica for the vLLM endpoint (@modal.concurrent)
      # Idle for the canonical config (no 4b branch). Kept low as a guard so the
      # 10-GPU project budget isn't blown if a config ever enables a 4b branch.
      max_containers: 2  # autoscale ceiling; min stays 0 (scale-to-zero)
      scaledown_window: 300
      timeout: 1800
    qwen3-embedding-8b:
      hf_id: "Qwen/Qwen3-Embedding-8B"
      served_name: "Qwen/Qwen3-Embedding-8B"
      task: "embed"
      gpu: "L40S"
      dtype: "bfloat16"
      max_model_len: 8192
      max_inputs: 64
      # Part of the 10-GPU budget: 8b gets 4 (see qwen3_encoder comment).
      max_containers: 4
      scaledown_window: 300
      timeout: 1800
