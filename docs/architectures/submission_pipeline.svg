<svg xmlns="http://www.w3.org/2000/svg" width="700" viewBox="0 0 700 918" role="img" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<title>Our RecSys 2026 Music-CRS submission pipeline</title>
<desc>A multi-turn conversation is extracted into a structured state, resolved against the track catalog, retrieved via BM25 plus multiple dense/centroid branches, fused with weighted RRF and soft adjustments, reranked with a LightGBM judge, and explained with an LLM response generator, producing predictions.json.</desc>
<style>
  text{font-family:inherit}
  .th{font-size:15px;font-weight:600;fill:#111827}
  .t{font-size:13.5px;font-weight:600;fill:#1f2937}
  .ts{font-size:11.5px;font-weight:400;fill:#6b7280}
  .arr{stroke:#9ca3af;stroke-width:1.5;fill:none}
  rect.bx{stroke-width:1.4}
  .blue rect{fill:#eaf1fd;stroke:#4f86d6}
  .teal rect{fill:#e1f5f1;stroke:#27a99c}
  .amber rect{fill:#fcefda;stroke:#dca33a}
  .green rect{fill:#e7f5e8;stroke:#52ab59}
  .gray rect{fill:#f1f3f5;stroke:#cbd2d9}
  .gray rect.dashed{stroke-dasharray:4 3}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="700" height="918" rx="12" fill="#ffffff"/>

<text class="th" x="350" y="24" text-anchor="middle">Our submission pipeline — one turn, top to bottom</text>

<g class="gray"><rect class="bx" x="50" y="40" width="600" height="50" rx="8"/><text class="t" x="350" y="62" text-anchor="middle">Multi-turn conversation</text><text class="ts" x="350" y="80" text-anchor="middle">session_memory — full chat history + user profile</text></g>
<line class="arr" x1="350" y1="90" x2="350" y2="118" marker-end="url(#arrow)"/>

<g class="blue"><rect class="bx" x="50" y="118" width="600" height="90" rx="8"/><text class="t" x="350" y="146" text-anchor="middle">1 · State extraction</text><text class="ts" x="350" y="168" text-anchor="middle">mcrs/conversation_state/</text><text class="ts" x="350" y="186" text-anchor="middle">LLM (deepseek-v4-flash) → intent, entities, constraints, rejections</text></g>
<line class="arr" x1="350" y1="208" x2="350" y2="236" marker-end="url(#arrow)"/>

<g class="teal"><rect class="bx" x="50" y="236" width="600" height="90" rx="8"/><text class="t" x="350" y="264" text-anchor="middle">2 · Resolve</text><text class="ts" x="350" y="286" text-anchor="middle">mcrs/qu_modules/resolver_v0plus.py</text><text class="ts" x="350" y="304" text-anchor="middle">fuzzy-match surface names → catalog track/artist IDs · track played/rejected</text></g>
<line class="arr" x1="350" y1="326" x2="350" y2="354" marker-end="url(#arrow)"/>

<g class="amber"><rect class="bx" x="50" y="354" width="600" height="90" rx="8"/><text class="t" x="350" y="382" text-anchor="middle">3 · Multi-branch retrieval</text><text class="ts" x="350" y="404" text-anchor="middle">mcrs/qu_modules/compiler_v0plus.py</text><text class="ts" x="350" y="422" text-anchor="middle">BM25 sparse FTS + dense ANN (Qwen3) + centroid/CF/lookup branches, served from LanceDB</text></g>
<line class="arr" x1="350" y1="444" x2="350" y2="472" marker-end="url(#arrow)"/>

<g class="gray"><rect class="bx" x="50" y="472" width="600" height="90" rx="8"/><text class="t" x="350" y="500" text-anchor="middle">4 · Weighted RRF fusion</text><text class="ts" x="350" y="522" text-anchor="middle">+ soft (de)promotes (post-fusion features)</text><text class="ts" x="350" y="540" text-anchor="middle">rank-fuses every branch pool → one candidate list (~500–1000 tracks)</text></g>
<line class="arr" x1="350" y1="562" x2="350" y2="590" marker-end="url(#arrow)"/>

<g class="green"><rect class="bx" x="50" y="590" width="600" height="90" rx="8"/><text class="t" x="350" y="618" text-anchor="middle">5 · LightGBM reranker</text><text class="ts" x="350" y="640" text-anchor="middle">mcrs/qu_modules/lgbm_reranker.py · models/reranker_v12_goalfree</text><text class="ts" x="350" y="658" text-anchor="middle">learned judge over the candidate pool → final top-20 track_ids</text></g>
<line class="arr" x1="350" y1="680" x2="350" y2="708" marker-end="url(#arrow)"/>

<g class="blue"><rect class="bx" x="50" y="708" width="600" height="90" rx="8"/><text class="t" x="350" y="736" text-anchor="middle">6 · Response generation</text><text class="ts" x="350" y="758" text-anchor="middle">mcrs/lm_modules/</text><text class="ts" x="350" y="776" text-anchor="middle">LiteLLM (qwen3-30b) writes the explanation for the top recommendation</text></g>
<line class="arr" x1="350" y1="798" x2="350" y2="826" marker-end="url(#arrow)"/>

<g class="gray"><rect class="bx dashed" x="50" y="826" width="600" height="72" rx="8"/><text class="t" x="350" y="854" text-anchor="middle">predictions.json</text><text class="ts" x="350" y="876" text-anchor="middle">20 track_ids + natural-language response, per turn</text></g>
</svg>
