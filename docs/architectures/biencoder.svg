<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 552" role="img" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<title>b1 bi-encoder architecture</title>
<desc>Two-tower bi-encoder: a query tower encodes the conversation and a doc tower encodes a catalog track through one shared Qwen3-Embedding-4B encoder, producing 2560-d unit vectors whose cosine drives the dense.b1 retrieval branch and the b1_cos reranker feature.</desc>
<style>
  text{font-family:inherit}
  .th{font-size:15px;font-weight:500;fill:#111827}
  .t{font-size:13px;font-weight:500;fill:#1f2937}
  .ts{font-size:11.5px;font-weight:400;fill:#6b7280}
  .arr{stroke:#9ca3af;stroke-width:1.5;fill:none}
  rect.bx{stroke-width:1.4}
  .blue rect{fill:#eaf1fd;stroke:#4f86d6}
  .teal rect{fill:#e1f5f1;stroke:#27a99c}
  .amber rect{fill:#fcefda;stroke:#dca33a}
  .green rect{fill:#e7f5e8;stroke:#52ab59}
  .gray rect{fill:#f1f3f5;stroke:#cbd2d9}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="552" rx="12" fill="#ffffff"/>

<text class="th" x="40" y="30">b1 bi-encoder · conversation and track into one 2560-d space</text>

<g class="blue"><rect class="bx" x="50" y="46" width="280" height="56" rx="8"/><text class="t" x="190" y="72" text-anchor="middle">conversation turns</text><text class="ts" x="190" y="90" text-anchor="middle">raw user text + last played track</text></g>
<g class="teal"><rect class="bx" x="350" y="46" width="280" height="56" rx="8"/><text class="t" x="490" y="72" text-anchor="middle">catalog track</text><text class="ts" x="490" y="90" text-anchor="middle">artist · title · year · tags · known-for</text></g>

<line class="arr" x1="190" y1="102" x2="190" y2="128" marker-end="url(#arrow)"/>
<line class="arr" x1="490" y1="102" x2="490" y2="128" marker-end="url(#arrow)"/>
<text class="ts" x="200" y="120" text-anchor="start">build_q</text>
<text class="ts" x="500" y="120" text-anchor="start">build_doc</text>

<g class="blue"><rect class="bx" x="50" y="130" width="280" height="86" rx="8"/><text class="t" x="190" y="152" text-anchor="middle">query text (v_struct_pt)</text><text class="ts" x="190" y="172" text-anchor="middle">[prev] u(t-1) [now] u(t)</text><text class="ts" x="190" y="189" text-anchor="middle">[prev_track] artist — title</text><text class="ts" x="190" y="206" text-anchor="middle">prefixed with INSTRUCT (query only)</text></g>
<g class="teal"><rect class="bx" x="350" y="130" width="280" height="86" rx="8"/><text class="t" x="490" y="152" text-anchor="middle">doc text</text><text class="ts" x="490" y="172" text-anchor="middle">Music track: artist — title (year)</text><text class="ts" x="490" y="189" text-anchor="middle">| tags: a, b, c | known for: …</text><text class="ts" x="490" y="206" text-anchor="middle">known-for dropped 30% in training</text></g>

<line class="arr" x1="190" y1="216" x2="190" y2="238" marker-end="url(#arrow)"/>
<line class="arr" x1="490" y1="216" x2="490" y2="238" marker-end="url(#arrow)"/>

<g class="amber"><rect class="bx" x="50" y="240" width="580" height="58" rx="8"/><text class="t" x="340" y="266" text-anchor="middle">Qwen3-Embedding-4B — one shared encoder (bf16)</text><text class="ts" x="340" y="286" text-anchor="middle">last-token pooling → L2-normalize · max_len 2048</text></g>

<line class="arr" x1="190" y1="298" x2="190" y2="320" marker-end="url(#arrow)"/>
<line class="arr" x1="490" y1="298" x2="490" y2="320" marker-end="url(#arrow)"/>

<g class="blue"><rect class="bx" x="50" y="322" width="280" height="50" rx="8"/><text class="t" x="190" y="344" text-anchor="middle">q_vec · 2560-d unit</text><text class="ts" x="190" y="361" text-anchor="middle">encoded live (cached)</text></g>
<g class="teal"><rect class="bx" x="350" y="322" width="280" height="50" rx="8"/><text class="t" x="490" y="344" text-anchor="middle">d_vec · 2560-d unit</text><text class="ts" x="490" y="361" text-anchor="middle">precomputed · LanceDB column</text></g>

<line class="arr" x1="190" y1="372" x2="300" y2="394" marker-end="url(#arrow)"/>
<line class="arr" x1="490" y1="372" x2="380" y2="394" marker-end="url(#arrow)"/>

<g class="green"><rect class="bx" x="215" y="396" width="250" height="50" rx="8"/><text class="t" x="340" y="418" text-anchor="middle">score = cos(q_vec, d_vec)</text><text class="ts" x="340" y="435" text-anchor="middle">dot product · both unit</text></g>

<line class="arr" x1="300" y1="446" x2="190" y2="468" marker-end="url(#arrow)"/>
<line class="arr" x1="380" y1="446" x2="490" y2="468" marker-end="url(#arrow)"/>

<g class="gray"><rect class="bx" x="50" y="470" width="280" height="64" rx="8"/><text class="t" x="190" y="492" text-anchor="middle">dense.b1 retrieval branch</text><text class="ts" x="190" y="510" text-anchor="middle">top-k over 47k doc vectors</text><text class="ts" x="190" y="526" text-anchor="middle">off in deployed scout-only</text></g>
<g class="green"><rect class="bx" x="350" y="470" width="280" height="64" rx="8"/><text class="t" x="490" y="492" text-anchor="middle">b1_cos reranker feature</text><text class="ts" x="490" y="510" text-anchor="middle">cosine with each candidate</text><text class="ts" x="490" y="526" text-anchor="middle">→ LightGBM judge</text></g>
</svg>
