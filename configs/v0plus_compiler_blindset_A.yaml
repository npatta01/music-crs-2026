# v0+ ConversationState Compiler — blindset_A config
#
# Submission config:
#   - test_dataset_name -> Blind-A
#   - retrieval_topk    -> 20 (submission format)

lm_type: "dummy"  # response generation is downstream of this experiment's scope
retrieval_type: "bm25"  # placeholder — V0PlusCompilerQU owns its own retriever
                         # and CRS_BASELINE bypasses `self.retrieval` for this qu

qu_type: "v0plus_compiler"
qu_kwargs:
  max_in_flight: 8

  extractor:
    model_name: "openrouter/google/gemma-3-12b-it"
    prompt_version: "current"
    temperature: 0.0
    max_tokens: 1500
    timeout_s: 90

  catalog:
    metadata_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
    embeddings_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Embeddings"
    metadata_split: "all_tracks"
    embeddings_split: "all_tracks"

  encoder:
    backend: "litellm"
    model_name: "openai/Qwen/Qwen3-Embedding-0.6B"
    api_base: "https://api.deepinfra.com/v1/openai"
    batch_size: 32
    encoding_format: "float"

  lancedb:
    db_uri: "./cache/lancedb"
    table_name: "music_track_catalog"

  resolver:
    score_cutoff: 80
    artist_match_topk: 20
    track_match_topk: 5

  compiler:
    bm25_k: 1000
    dense_k: 1000
    rrf_k: 60
    final_topk: 1000
    field_boosts:
      track_name: 3.0
      artist_name: 3.0
      album_name: 2.0
      tag_list: 1.5
    centroid_alpha:
      refinement: 0.30
      playlist_build: 0.30
      pivot: 0.0
      open_explore: 0.0
    anchor_tag_expansion_n: 5
    rejected_tag_multiplier: 0.5
    positive_tag_multiplier_step: 0.15
    same_artist_demote: 1.0
    enable_dense: false
    dense_branches:
      - vector_field: "metadata_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "lyrics_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"

test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Blind-A"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
attn_implementation: "eager"
retrieval_topk: 20
