# v0+ ConversationState Compiler - POOL EXPANDED (devset)
#
# Pool expansion for v10: adds missing dense branches from all-retrievers +
# bumps pool_k 500->1000. Goal: raise Hit@1000 ceiling toward ~0.73 and
# improve Hit@20/nDCG@20 by exposing more reachable gold to the reranker.
#
# Changes vs v0plus_compiler_pruned_resolved_tags_devset:
#   - pool_k: 1000 (was 500)
#   - dense_branches: +8 branches from all-retrievers config:
#       * qwen_0_6b: metadata+xintent, attributes+attributes_enriched
#       * qwen_8b: intent, attributes_enriched
#       * clap_text: sonic, sonic_nl_enriched
#   - branch_trace_topk/bm25_k/dense_k/final_topk bumped to match expanded pool

lm_type: "dummy"
retrieval_type: "bm25"

qu_type: "v0plus_compiler"
qu_kwargs:
  max_in_flight: 8

  extractor:
    model_name: "openrouter/deepseek/deepseek-v4-flash"
    prompt_version: "v1"
    temperature: 0.0
    max_tokens: 8000
    timeout_s: 120

  catalog:
    metadata_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
    embeddings_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Embeddings"
    metadata_split: "all_tracks"
    embeddings_split: "all_tracks"

  encoders:
    qwen_0_6b:
      backend: "litellm"
      model_name: "openai/Qwen/Qwen3-Embedding-0.6B"
      api_base: "https://api.deepinfra.com/v1/openai"
      batch_size: 32
      encoding_format: "float"
    qwen_8b:
      backend: "litellm"
      model_name: "openai/Qwen/Qwen3-Embedding-8B"
      vllm_endpoint: "qwen3-embedding-8b"
      api_key: "${oc.env:VLLM_API_KEY,EMPTY}"
      batch_size: 32
      encoding_format: "float"
      extra_params:
        timeout: 600
    clap_text:
      backend: "modal_multimodal"
      modal_app_name: "music-crs"
      modal_cls_name: "MultimodalTextEncoder"
      method: "embed_clap_text"

  lancedb:
    db_uri: "./cache/lancedb"
    table_name: "music_track_catalog"

  resolver:
    score_cutoff: 80
    artist_match_topk: 20
    track_match_topk: 5

  compiler:
    bm25_v1_attribute_tag_policy: "resolved"
    tag_resolver_embedding_index_path: "cache/tag_embedding_index/qwen_0_6b.npz"
    tag_resolver_encoder_id: "qwen_0_6b"
    tag_resolver_embedding_min_score: 0.60
    tag_resolver_embedding_topk: 3
    tag_resolver_max_tags_per_phrase: 3
    tag_resolver_min_track_count: 5

    # Pool expansion: these control how many hits per branch feed into RRF union
    branch_trace_topk: 1000
    bm25_k: 1000
    dense_k: 1000
    rrf_k: 60
    final_topk: 1000

    field_boosts:
      track_name: 3.0
      artist_name: 3.0
      album_name: 2.0
      tag_list: 1.5
      release_year: 1.0
      release_decade: 1.0

    centroid_alpha:
      refinement: 0.30
      playlist_build: 0.30
      pivot: 0.0
      open_explore: 0.0
    anchor_tag_expansion_n: 5
    rejected_tag_multiplier: 0.5
    positive_tag_multiplier_step: 0.15
    same_artist_demote: 1.0

    enable_dense: true
    # Pruned config had 4 dense branches; all-retrievers has 12. Adding the 8 missing ones:
    dense_branches:
      # === Original pruned branches (kept) ===
      - vector_field: "lyrics_qwen3_embedding_0_6b"
        encoder_id: "qwen_0_6b"
        query_id: "lyric"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "metadata_qwen3_embedding_8b"
        encoder_id: "qwen_8b"
        query_id: "metadata"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_8b"
        encoder_id: "qwen_8b"
        query_id: "attributes"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "audio_laion_clap"
        encoder_id: "clap_text"
        query_id: "sonic_nl"
        weight: 1.0
        distance_type: "cosine"

      # === Added from all-retrievers (qwen_0_6b) ===
      - vector_field: "metadata_qwen3_embedding_0_6b"
        encoder_id: "qwen_0_6b"
        query_id: "metadata"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "metadata_qwen3_embedding_0_6b"
        encoder_id: "qwen_0_6b"
        query_id: "intent"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_0_6b"
        encoder_id: "qwen_0_6b"
        query_id: "attributes"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_0_6b"
        encoder_id: "qwen_0_6b"
        query_id: "attributes_enriched"
        weight: 1.0
        distance_type: "cosine"

      # === Added from all-retrievers (qwen_8b) ===
      - vector_field: "metadata_qwen3_embedding_8b"
        encoder_id: "qwen_8b"
        query_id: "intent"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_8b"
        encoder_id: "qwen_8b"
        query_id: "attributes_enriched"
        weight: 1.0
        distance_type: "cosine"

      # === Added from all-retrievers (CLAP variants) ===
      - vector_field: "audio_laion_clap"
        encoder_id: "clap_text"
        query_id: "sonic"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "audio_laion_clap"
        encoder_id: "clap_text"
        query_id: "sonic_nl_enriched"
        weight: 1.0
        distance_type: "cosine"

    centroid_only_branches:
      - vector_field: "image_siglip2"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"
      - vector_field: "audio_laion_clap"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"
      - vector_field: "cf_bpr"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"
      - vector_field: "cf_bpr"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"
        centroid_source: "user"

    routing_boost: {}
    enable_similar_artist_anchors: true

    enable_resolved_artist_discography: true
    disco_weight: 1.0
    disco_cap: 150
    disco_confidence_threshold: 90.0
    disco_gated_intents: ["pivot"]

    enable_era_popularity: true
    era_pop_weight: 1.0
    era_pop_cap: 200

test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
attn_implementation: "eager"
retrieval_topk: 1000
