# v0+ Compiler: canonical image_siglip2 config + v3 extractor prompt.
#
# IDENTICAL to v0plus_compiler_image_devset.yaml EXCEPT the extractor block:
#   - model_name: gemma-4-26b-a4b-it (was gemma-3-12b-it)
#   - prompt_version: v3 (generous extraction + catalog-vocabulary bridging)
#
# Purpose: isolate the EXTRACTOR effect on end-to-end retrieval. Retrieval
# branches (BM25 + image_siglip2 centroid) are unchanged, so any NDCG@20 /
# Hit@20 delta vs the canonical baseline (NDCG@20 = 0.1461) is attributable to
# the extractor producing better conversation-state (more catalog-matching
# tags + reliable era→release_date filters).
#
# Provenance of the extractor change:
#   experiments/analysis/extractor_prompt_v2/README.md — v3 beats v2c on every
#   retrieval-predictive metric on the 2744-turn failure cohort: catalog recall
#   9.2%→11.4%, era→release_date 67%→89%, bridged tokens 7.5×. gemma-4-26b is
#   the chosen model (0 systematic JSON errors; gemma-3-12b had a 24% call-fail
#   rate under the longer prompt).
#
# Run a 50-session slice first (per project memory: smoke slice → report →
# go-ahead before full devset):
#   python run_experiment.py --backend modal \
#     --tid v0plus_compiler_image_extractor_v3_devset --num_sessions 50

lm_type: "dummy"
retrieval_type: "bm25"

qu_type: "v0plus_compiler"
qu_kwargs:
  max_in_flight: 8

  extractor:
    model_name: "openrouter/google/gemma-4-26b-a4b-it"
    prompt_version: "v3"
    temperature: 0.0
    # v3 emits more (named entities + user-word AND catalog-canonical tag forms),
    # so JSON outputs run longer than v1's. At 1500 a fraction truncated
    # mid-string ("Unterminated string"), forcing the temp-retry. 4000 gives
    # comfortable headroom — the longest observed v3 state is well under 2000
    # tokens, so this is ~2x buffer.
    max_tokens: 4000
    timeout_s: 120

  catalog:
    metadata_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
    embeddings_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Embeddings"
    metadata_split: "all_tracks"
    embeddings_split: "all_tracks"

  encoder:
    backend: "litellm"
    model_name: "openai/Qwen/Qwen3-Embedding-0.6B"
    api_base: "https://api.deepinfra.com/v1/openai"
    batch_size: 32
    encoding_format: "float"

  lancedb:
    db_uri: "./cache/lancedb"
    table_name: "music_track_catalog"

  resolver:
    score_cutoff: 80
    artist_match_topk: 20
    track_match_topk: 5

  compiler:
    bm25_k: 1000
    dense_k: 1000
    rrf_k: 60
    final_topk: 1000
    field_boosts:
      track_name: 3.0
      artist_name: 3.0
      album_name: 2.0
      tag_list: 1.5
    centroid_alpha:
      refinement: 0.30
      playlist_build: 0.30
      pivot: 0.0
      open_explore: 0.0
    anchor_tag_expansion_n: 5
    rejected_tag_multiplier: 0.5
    positive_tag_multiplier_step: 0.15
    same_artist_demote: 1.0
    enable_dense: false
    dense_branches:
      - vector_field: "metadata_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "lyrics_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"

    enable_cf_bpr: false
    centroid_only_branches:
      - vector_field: "image_siglip2"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"

test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
attn_implementation: "eager"
retrieval_topk: 1000
