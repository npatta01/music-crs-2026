# v0+ canonical devset config.
#
# Based on the recent all-retrievers config, with explicit encoder IDs for each
# dense vector field:
#   - qwen_0_6b -> metadata/attributes/lyrics_qwen3_embedding_0_6b
#   - qwen_8b   -> metadata/attributes_qwen3_embedding_8b
#   - clap_text -> audio_laion_clap text-side dense branch
#
# Preconditions:
# 1. LanceDB table at lancedb.db_uri / table_name with FTS indexes
#    (track_name, artist_name, album_name, tag_list, release_date,
#    release_year, release_decade) and vector columns:
#    metadata_qwen3_embedding_0_6b, attributes_qwen3_embedding_0_6b,
#    lyrics_qwen3_embedding_0_6b, metadata_qwen3_embedding_8b,
#    attributes_qwen3_embedding_8b, audio_laion_clap, image_siglip2, cf_bpr.
# 2. Modal app `music-crs` deployed with MultimodalTextEncoder for clap_text.
# 3. Modal app `music-crs-vllm` deployed with qwen3-embedding-8b.
# 4. Env keys: OPENROUTER_API_KEY, DEEPINFRA_API_KEY, VLLM_API_KEY.

lm_type: "dummy"
retrieval_type: "bm25"

qu_type: "v0plus_compiler"
qu_kwargs:
  max_in_flight: 8

  extractor:
    model_name: "openrouter/deepseek/deepseek-v4-flash"
    prompt_version: "current"
    temperature: 0.0
    max_tokens: 8000
    timeout_s: 120

  catalog:
    metadata_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
    embeddings_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Embeddings"
    metadata_split: "all_tracks"
    embeddings_split: "all_tracks"

  # All dense query encoders are named. Branches below must opt into one via
  # encoder_id, so 0.6B fields cannot accidentally use the 8B encoder.
  encoders:
    qwen_0_6b:
      backend: "litellm"
      model_name: "openai/Qwen/Qwen3-Embedding-0.6B"
      api_base: "https://api.deepinfra.com/v1/openai"
      batch_size: 32
      encoding_format: "float"
    qwen_8b:
      backend: "litellm"
      model_name: "openai/Qwen/Qwen3-Embedding-8B"
      # api_base is resolved at runtime from this logical endpoint name.
      vllm_endpoint: "qwen3-embedding-8b"
      api_key: "${oc.env:VLLM_API_KEY,EMPTY}"
      batch_size: 32
      encoding_format: "float"
      extra_params:
        timeout: 600
    clap_text:
      backend: "modal_multimodal"
      modal_app_name: "music-crs"
      modal_cls_name: "MultimodalTextEncoder"
      method: "embed_clap_text"

  lancedb:
    db_uri: "./cache/lancedb"
    table_name: "music_track_catalog"

  resolver:
    score_cutoff: 80
    artist_match_topk: 20
    track_match_topk: 5

  compiler:
    branch_trace_topk: 1000
    bm25_k: 1000
    dense_k: 1000
    rrf_k: 60
    final_topk: 1000

    field_boosts:
      track_name: 3.0
      artist_name: 3.0
      album_name: 2.0
      tag_list: 1.5
      release_year: 1.0
      release_decade: 1.0

    centroid_alpha:
      refinement: 0.30
      playlist_build: 0.30
      pivot: 0.0
      open_explore: 0.0
    anchor_tag_expansion_n: 5
    rejected_tag_multiplier: 0.5
    positive_tag_multiplier_step: 0.15
    same_artist_demote: 1.0

    enable_dense: true
    dense_branches:
      - vector_field: "metadata_qwen3_embedding_0_6b"
        encoder_id: "qwen_0_6b"
        query_id: "metadata"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_0_6b"
        encoder_id: "qwen_0_6b"
        query_id: "attributes"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "lyrics_qwen3_embedding_0_6b"
        encoder_id: "qwen_0_6b"
        query_id: "lyric"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "metadata_qwen3_embedding_8b"
        encoder_id: "qwen_8b"
        query_id: "metadata"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_8b"
        encoder_id: "qwen_8b"
        query_id: "attributes"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "audio_laion_clap"
        encoder_id: "clap_text"
        query_id: "sonic"
        weight: 1.0
        distance_type: "cosine"

    centroid_only_branches:
      - vector_field: "image_siglip2"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"
      - vector_field: "audio_laion_clap"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"
      - vector_field: "cf_bpr"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"
      - vector_field: "cf_bpr"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"
        centroid_source: "user"

    routing_boost: {}

    enable_resolved_artist_discography: true
    disco_weight: 1.0
    disco_cap: 150
    disco_confidence_threshold: 90.0
    disco_gated_intents: ["pivot"]

    enable_era_popularity: true
    era_pop_weight: 1.0
    era_pop_cap: 200

test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
attn_implementation: "eager"
retrieval_topk: 1000
