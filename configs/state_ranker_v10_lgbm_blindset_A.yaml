# Blind-A learned-ranker submission config for state-ranker v10.

explanation_lm_type: litellm
explanation_lm_kwargs:
  model_name: openrouter/qwen/qwen3-30b-a3b-instruct-2507
  temperature: 0.0
  max_tokens: 512
explanation_kwargs:
  template: phase2_best_qwen
  conditioning: latest_state
  item_format: xml
  max_tags: 10
  echo_retries: 0

lm_type: dummy
qu_type: state_ranker
qu_kwargs:
  max_in_flight: 4
  compile_max_in_flight: 4
  ranking:
    mode: lgbm
    model_version: lgbm_v10
    model_path: ${oc.env:MCRS_MODEL_DIR,models/reranker_v10}/model.txt
    meta_path: ${oc.env:MCRS_MODEL_DIR,models/reranker_v10}/meta.json
    cat_maps: ${oc.env:MCRS_MODEL_DIR,models/reranker_v10}/cat_maps.json
    branch_names: ${oc.env:MCRS_MODEL_DIR,models/reranker_v10}/branch_names.json
    tag_index: ${oc.env:MCRS_CACHE_DIR,./cache}/tag_embedding_index/qwen_0_6b.npz
    embed_memo: ${oc.env:MCRS_RERANKER_DIR,./exp/analysis/rerank}/q06_memo_blindA.json
    msg_store: ${oc.env:MCRS_RERANKER_DIR,./exp/analysis/rerank}/raw_msg_store
    pool_k: 500
    top_k_out: 1000
  extractor:
    model_name: openrouter/deepseek/deepseek-v4-flash
    prompt_version: v1
    temperature: 0.0
    max_tokens: 8000
    timeout_s: 120
  catalog:
    metadata_dataset: talkpl-ai/TalkPlayData-Challenge-Track-Metadata
    embeddings_dataset: talkpl-ai/TalkPlayData-Challenge-Track-Embeddings
    metadata_split: all_tracks
    embeddings_split: all_tracks
  encoders:
    qwen_0_6b:
      backend: litellm
      model_name: openai/Qwen/Qwen3-Embedding-0.6B
      api_base: https://api.deepinfra.com/v1/openai
      batch_size: 32
      encoding_format: float
      disk_cache: true
      cache_dir: ${oc.env:MCRS_EMBEDDING_CACHE_DIR,./cache/embeddings}
    qwen_8b:
      backend: litellm
      model_name: openai/Qwen/Qwen3-Embedding-8B
      vllm_endpoint: qwen3-embedding-8b
      api_key: ${oc.env:VLLM_API_KEY,EMPTY}
      batch_size: 32
      encoding_format: float
      disk_cache: true
      cache_dir: ${oc.env:MCRS_EMBEDDING_CACHE_DIR,./cache/embeddings}
      extra_params:
        timeout: 600
    clap_text:
      backend: modal_multimodal
      modal_app_name: music-crs
      modal_cls_name: MultimodalTextEncoder
      method: embed_clap_text
    siglip2_text:
      backend: modal_multimodal
      modal_app_name: music-crs
      modal_cls_name: MultimodalTextEncoder
      method: embed_siglip_text
  lancedb:
    db_uri: ./cache/lancedb
    table_name: music_track_catalog
  resolver:
    score_cutoff: 80
    artist_match_topk: 20
    track_match_topk: 5
  compiler:
    enable_strict_artist_policy: false   # #152 hard-drop nets the GT in 47.6% of fired turns (-0.04 nDCG@20)
    rejection_drop_policy: track_only
    enable_release_date_hard_filter: false
    soft_adjust_skip_intents: [pivot]
    scrub_negated_intent_tags: true
    bm25_v1_attribute_tag_policy: resolved
    tag_resolver_embedding_index_path: ${oc.env:MCRS_CACHE_DIR,./cache}/tag_embedding_index/qwen_0_6b.npz
    tag_resolver_encoder_id: qwen_0_6b
    tag_resolver_embedding_min_score: 0.6
    tag_resolver_embedding_topk: 3
    tag_resolver_max_tags_per_phrase: 3
    tag_resolver_min_track_count: 5
    branch_trace_topk: 1000
    bm25_k: 1000
    dense_k: 1000
    rrf_k: 60
    final_topk: 1000
    field_boosts:
      track_name: 3.0
      artist_name: 3.0
      album_name: 2.0
      tag_list: 1.5
      release_year: 1.0
      release_decade: 1.0
    centroid_alpha:
      refinement: 0.3
      playlist_build: 0.3
      pivot: 0.0
      open_explore: 0.0
    anchor_tag_expansion_n: 5
    rejected_tag_multiplier: 0.5
    positive_tag_multiplier_step: 0.15
    same_artist_demote: 1.0
    enable_dense: true
    dense_branches:
    - vector_field: lyrics_qwen3_embedding_0_6b
      encoder_id: qwen_0_6b
      query_id: lyric
      weight: 1.0
      distance_type: cosine
    - vector_field: metadata_qwen3_embedding_8b
      encoder_id: qwen_8b
      query_id: metadata
      weight: 1.0
      distance_type: cosine
    - vector_field: attributes_qwen3_embedding_8b
      encoder_id: qwen_8b
      query_id: attributes
      weight: 1.0
      distance_type: cosine
    - vector_field: audio_laion_clap
      encoder_id: clap_text
      query_id: sonic_nl
      weight: 1.0
      distance_type: cosine
    # Visual route (issue #127): SigLIP-2 text->cover-art search, fires ONLY on
    # image_or_visual_search turns (gated). Improves visual-slice candidate
    # coverage; top-20 impact is ~flat with the frozen v10 reranker.
    - vector_field: image_siglip2
      encoder_id: siglip2_text
      query_id: visual_nl
      weight: 1.0
      distance_type: cosine
      gated_on: image_or_visual_search
    centroid_only_branches:
    # Anchor cover-art centroid: keep always-on for anchored turns. Gating this
    # to visual-only turns collapses candidate coverage for the v10 ranker.
    - vector_field: image_siglip2
      weight: 1.0
      topk: 1000
      distance_type: cosine
    - vector_field: audio_laion_clap
      weight: 1.0
      topk: 1000
      distance_type: cosine
    - vector_field: cf_bpr
      weight: 1.0
      topk: 1000
      distance_type: cosine
    - vector_field: cf_bpr
      weight: 1.0
      topk: 1000
      distance_type: cosine
      centroid_source: user
    routing_boost: {}
    enable_similar_artist_anchors: true
    enable_resolved_artist_discography: true
    disco_weight: 1.0
    disco_cap: 150
    disco_confidence_threshold: 90.0
    disco_gated_intents: [pivot]
    enable_era_popularity: true
    era_pop_weight: 1.0
    era_pop_cap: 200

test_dataset_name: talkpl-ai/TalkPlayData-Challenge-Blind-A
item_db_name: talkpl-ai/TalkPlayData-Challenge-Track-Metadata
user_db_name: talkpl-ai/TalkPlayData-Challenge-User-Metadata
track_split_types: [all_tracks]
user_split_types: [all_users]
corpus_types: [track_name, artist_name, album_name, tag_list]
cache_dir: ./cache
device: cpu
attn_implementation: eager
retrieval_topk: 20
