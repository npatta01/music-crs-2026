# Response-generation bake-off candidate registry. All via OpenRouter
# (OPENROUTER_API_KEY). All generators run non-thinking.
generators:
  - tag: llama-1b
    model_name: openrouter/meta-llama/llama-3.2-1b-instruct
    completion_kwargs: {}
  - tag: gemma-4b
    model_name: openrouter/google/gemma-3-4b-it
    completion_kwargs: {}
  - tag: llama-3b
    model_name: openrouter/meta-llama/llama-3.2-3b-instruct
    completion_kwargs: {}
  - tag: qwen3-8b
    model_name: openrouter/qwen/qwen3-8b
    completion_kwargs:
      extra_body:
        reasoning:
          enabled: false
  - tag: deepseek-flash
    model_name: openrouter/deepseek/deepseek-v4-flash
    completion_kwargs: {}
  - tag: gemma-12b
    model_name: openrouter/google/gemma-3-12b-it
    completion_kwargs: {}
  - tag: gemma-27b
    model_name: openrouter/google/gemma-3-27b-it
    completion_kwargs: {}
  - tag: qwen3-30b-a3b
    model_name: openrouter/qwen/qwen3-30b-a3b-instruct-2507
    completion_kwargs: {}
  - tag: gpt5-nano
    model_name: openrouter/openai/gpt-5-nano
    completion_kwargs:
      reasoning_effort: minimal
  - tag: gemini-flash-lite
    model_name: openrouter/google/gemini-2.5-flash-lite
    completion_kwargs: {}

judges:
  gemini:
    model_name: openrouter/google/gemini-2.5-flash
  neutral:
    model_name: openrouter/openai/gpt-5-mini
    # gpt-5-mini is a reasoning model: at 512 tokens its hidden reasoning starved the
    # JSON ~9% of the time (empty / truncated -> parse failures). 4096 gives reasoning
    # + the tiny JSON ample room.
    max_tokens: 4096

defaults:
  temperature: 0.7
  # 2048 (not 256): reasoning models (deepseek-v4-flash, gpt-5-nano) spend part of the
  # budget on hidden reasoning tokens; a tight cap truncated/emptied their visible
  # answers, making the comparison unfair. A generous cap lets reasoning + answer both
  # fit. The prompt's "1-3 sentences" guidance still keeps well-behaved replies short.
  max_tokens: 2048
