# v0+ Round 2: per-encoder query templates.
#
# Same architecture as v0plus_compiler_textside_devset (Round 1):
# BM25 + image_centroid + SigLIP-text + CLAP-text. The ONLY difference
# is which query string each text-side branch encodes:
#
#   - SigLIP-text now uses query_id=visual →
#       "album cover, {positive_tags}"  (cover-art framing for SigLIP-2)
#   - CLAP-text now uses query_id=sonic →
#       "music: {positive_tags}; {turn_intent}"  (sonic framing for CLAP music)
#   - BM25/qwen3 still use query_id=intent (mixed query)
#
# Why: Round 1 measured the architecture works (novel-artist Hit@1000
# +17.6% on 50-session slice) but lost ranking (NDCG@20 -11.6% overall,
# -42.7% on novel). Root cause: the shared turn_intent query mixes
# sonic + visual + artist-name + lyrical-theme content, which is noise
# for the new encoders. CLAP wasn't trained to map artist names to
# audio; SigLIP wasn't trained on lyric themes. Per-encoder templates
# strip the noise modality each encoder can't use.
#
# Preconditions:
# 1. scripts/verify_textside_catalog_convention.py passes — mean cosine
#    between (text_for_track, catalog_for_track) is > random pairing and
#    not near zero. Run with both --normalize and without; pick the
#    convention with the larger lift over random.
# 2. Modal MultimodalTextEncoder service deployed (see modal/app.py).
# 3. LanceDB has both image_siglip2 (768d) and audio_laion_clap (512d)
#    as native ANN-queryable columns. Already true per the v0+ migration.

lm_type: "dummy"
retrieval_type: "bm25"

qu_type: "v0plus_compiler"
qu_kwargs:
  max_in_flight: 8

  extractor:
    model_name: "openrouter/google/gemma-3-12b-it"
    temperature: 0.0
    max_tokens: 1500
    timeout_s: 90

  catalog:
    metadata_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
    embeddings_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Embeddings"
    metadata_split: "all_tracks"
    embeddings_split: "all_tracks"

  # NEW: encoder registry — each named encoder is wired into a branch via
  # `encoder_id`. The "default" entry preserves back-compat with configs that
  # specify a single top-level `encoder:` block. Branches without an explicit
  # `encoder_id` use "default".
  encoders:
    default:
      backend: "litellm"
      model_name: "openai/Qwen/Qwen3-Embedding-0.6B"
      api_base: "https://api.deepinfra.com/v1/openai"
      batch_size: 32
      encoding_format: "float"
    siglip2_text:
      backend: "modal_multimodal"
      modal_app_name: "music-crs"
      modal_cls_name: "MultimodalTextEncoder"
      method: "embed_siglip_text"
    clap_text:
      backend: "modal_multimodal"
      modal_app_name: "music-crs"
      modal_cls_name: "MultimodalTextEncoder"
      method: "embed_clap_text"

  lancedb:
    db_uri: "./cache/lancedb"
    table_name: "music_track_catalog"

  resolver:
    score_cutoff: 80
    artist_match_topk: 20
    track_match_topk: 5

  compiler:
    bm25_k: 1000
    dense_k: 1000
    rrf_k: 60
    final_topk: 1000
    field_boosts:
      track_name: 3.0
      artist_name: 3.0
      album_name: 2.0
      tag_list: 1.5
    # No centroid mixing on the text-side branches — they are intentionally
    # anchor-free. Anchor mixing alpha=0 across modes; the image centroid
    # branch (centroid_only_branches below) is what carries continuation
    # signal.
    centroid_alpha:
      refinement: 0.0
      playlist_build: 0.0
      pivot: 0.0
      open_explore: 0.0
    anchor_tag_expansion_n: 5
    rejected_tag_multiplier: 0.5
    positive_tag_multiplier_step: 0.15
    same_artist_demote: 1.0

    # Per-branch ranking diagnostic. Each turn's trace gets a `branch_rankings`
    # map: branch_name -> top-K candidate IDs. Used offline to answer "where
    # does the GT rank inside each retriever?" — distinguishes a coverage
    # gap (GT not in any branch's top-K) from a fusion problem (GT in a
    # branch but RRF buries it). 1000 stores the full pool depth per branch.
    branch_trace_topk: 1000

    enable_dense: true
    # Anchor-FREE text-side branches.
    # Each issues one search_embedding(...) call with the encoded turn_intent
    # against the named LanceDB vector column.
    dense_branches:
      - vector_field: "image_siglip2"
        encoder_id: "siglip2_text"
        query_id: "visual"     # SigLIP-shaped: "album cover, {tags}"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "audio_laion_clap"
        encoder_id: "clap_text"
        query_id: "sonic"      # CLAP-shaped: "music: {tags}; {turn_intent}"
        weight: 1.0
        distance_type: "cosine"

    # Anchor-centric branches (kept from the canonical image config so we
    # can measure ADDITIVE lift — does text-side ride on top of image
    # centroid, or does it cannibalize?).
    enable_cf_bpr: false
    centroid_only_branches:
      - vector_field: "image_siglip2"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"

test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
attn_implementation: "eager"
retrieval_topk: 1000
