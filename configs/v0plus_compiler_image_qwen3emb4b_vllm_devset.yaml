# A/B variant of v0plus_compiler_image_devset: swaps the DeepInfra Qwen3-Embedding-0.6B
# encoder for the self-hosted vLLM Qwen3-Embedding-4B endpoint. All other sections
# are identical to the canonical config.
#
# v0+ score anchor: image_siglip2 branch ONLY (cf_bpr off).
#
# Uses a cover-art SigLIP2 centroid ANN over positive anchor tracks. This is the
# current top-20 ranking anchor after the retrieval bugfix rerun.
#
# Rationale:
#   - 64% of devset turns have a GT artist not seen in prior turns ("novel
#     artist" cohort). On that cohort our text-based branches retrieve at
#     Hit@20 = 0.091 vs 0.486 on continuation turns.
#   - image_siglip2 captures cover-art / visual-album neighborhood signal that
#     text retrieval alone cannot see.
#   - The branch is a no-op on turn 1 / pure-`pivot` turns (no anchors),
#     so RRF naturally falls back to text branches in those cases.
#
# Preconditions:
# 1. LanceDB table must have an `image_siglip2` vector column populated.
# 2. Verify the local/Modal index with `notebooks/05_lancedb_indexing.ipynb`.

lm_type: "dummy"
retrieval_type: "bm25"

qu_type: "v0plus_compiler"
qu_kwargs:
  max_in_flight: 8

  extractor:
    model_name: "openrouter/google/gemma-3-12b-it"
    prompt_version: "current"
    temperature: 0.0
    max_tokens: 1500
    timeout_s: 90

  catalog:
    metadata_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
    embeddings_dataset: "talkpl-ai/TalkPlayData-Challenge-Track-Embeddings"
    metadata_split: "all_tracks"
    embeddings_split: "all_tracks"

  encoder:
    backend: "litellm"
    model_name: "openai/Qwen/Qwen3-Embedding-4B"
    # api_base is resolved at runtime from this logical endpoint name
    # (see modal/vllm_serve.py resolve_vllm_endpoints_in_qu_kwargs).
    vllm_endpoint: "qwen3-embedding-4b"
    api_key: "${oc.env:VLLM_API_KEY,EMPTY}"
    batch_size: 32
    encoding_format: "float"
    # Absorb scale-to-zero cold starts (first embed after idle can take 30-90s+).
    extra_params:
      timeout: 600

  lancedb:
    db_uri: "./cache/lancedb"
    table_name: "music_track_catalog"

  resolver:
    score_cutoff: 80
    artist_match_topk: 20
    track_match_topk: 5

  compiler:
    bm25_k: 1000
    dense_k: 1000
    rrf_k: 60
    final_topk: 1000
    field_boosts:
      track_name: 3.0
      artist_name: 3.0
      album_name: 2.0
      tag_list: 1.5
    centroid_alpha:
      refinement: 0.30
      playlist_build: 0.30
      pivot: 0.0
      open_explore: 0.0
    anchor_tag_expansion_n: 5
    rejected_tag_multiplier: 0.5
    positive_tag_multiplier_step: 0.15
    same_artist_demote: 1.0
    # Sparse-only baseline carried over from the parent config — dense Qwen3
    # branches were a net negative on full devset (NDCG@20 -15%). Re-enable
    # later behind a reranker that can rescue exact-match precision.
    enable_dense: false
    dense_branches:
      - vector_field: "metadata_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "attributes_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"
      - vector_field: "lyrics_qwen3_embedding_0_6b"
        weight: 1.0
        distance_type: "cosine"

    # Centroid-only branches: anchor-track centroid → LanceDB ANN. No encoded
    # query text. cf_bpr is OFF here to isolate image_siglip2's contribution.
    enable_cf_bpr: false
    centroid_only_branches:
      - vector_field: "image_siglip2"
        weight: 1.0
        topk: 1000
        distance_type: "cosine"

test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "tag_list"
cache_dir: "./cache"
device: "cpu"
attn_implementation: "eager"
retrieval_topk: 1000
